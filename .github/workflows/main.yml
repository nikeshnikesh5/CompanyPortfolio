name: Frontend Docker Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Run Unit Tests
      - name: Run Unit Tests
        run: npm test

      # 5️⃣ Check Test Coverage (optional fail if <80%)
      - name: Coverage Check
        run: |
          npm run coverage
          COVERAGE=$(npx jest --coverage --coverageThreshold '{"global": {"branches": 80,"functions": 80,"lines": 80,"statements": 80}}')
          echo "$COVERAGE"
      # 6️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t my-app:latest .

      # 7️⃣ Run container for quick integration test
      - name: Run Container and Test
        run: |
          docker run -d -p 3000:80 --name test-container my-app:latest
          sleep 5
          curl -f http://localhost:3000
          docker stop test-container
          docker rm test-container
      # 8️⃣ Push to Docker Hub
      - name: Push Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          docker tag my-app:latest $DOCKER_USERNAME/my-app:latest
          docker push $DOCKER_USERNAME/my-app:latest
      # 9️⃣ Deploy to Vercel
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --token=$VERCEL_TOKEN
