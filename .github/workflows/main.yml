name: Frontend Docker Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code - Updated to v5
      - name: Checkout
        uses: actions/checkout@v5

      # 2️⃣ Setup Node.js - Updated to v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Run Unit Tests
      - name: Run Unit Tests
        run: npm test

      # 5️⃣ Check Test Coverage
      - name: Coverage Check
        run: |
          npm run coverage
          # Ensure your package.json has a 'coverage' script defined
          npx jest --coverage --coverageThreshold '{"global": {"branches": 80,"functions": 80,"lines": 80,"statements": 80}}'

      # 6️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t my-app:latest .

      # 7️⃣ Run container for quick integration test
      - name: Run Container and Test
        run: |
          docker run -d -p 3000:3000 --name test-container my-app:latest
          sleep 5
          curl -f http://localhost:3000
          docker stop test-container
          docker rm test-container

      # 8️⃣ Push to Docker Hub
      - name: Push to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          # Use printf to avoid trailing newline issues and TTY errors
          printf '%s' "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          
          # Tag and Push
          docker tag my-app:latest "$DOCKER_USERNAME/my-app:latest"
          docker push "$DOCKER_USERNAME/my-app:latest"

      # 9️⃣ Deploy to Vercel
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --token=$VERCEL_TOKEN --yes --name="granitura-web"
